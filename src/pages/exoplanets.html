<section class="exo-page">

<h1 class="exo-title">Habitable Exoplanet Candidates</h1>

<p class="exo-subtitle">
Potential Earth-like planets discovered by NASA missions
</p>

<div class="exo-controls">

<input 
type="text" 
id="searchPlanet" 
placeholder="Search planet..."
class="exo-search"
/>

</div>

<div id="loading" class="exo-loading">
Loading exoplanets...
</div>

<div id="error" class="exo-error hidden"></div>

<div id="exoplanet-grid" class="exo-grid"></div>

<div class="exo-pagination">
<button id="prevBtn">Previous</button>
<span id="pageInfo"></span>
<button id="nextBtn">Next</button>
</div>

</section>
