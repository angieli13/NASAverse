<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APOD | NASAverse</title>

  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/apod.css">
</head>

<body>

<header id="header"></header>

<main class="apod-container">

  <span class="apod-date" id="fecha"></span>
  <h1 class="apod-title" id="titulo">Imagen del Día</h1>

  <div class="apod-content">

    <p class="apod-description" id="descripcion"></p>

    <div class="apod-image-wrapper">
      <img id="imagen" src="" alt="Imagen astronómica del día - NASA">
    </div>

  </div>

</main>

<footer id="footer"></footer>

<script src="../components/footer.js"></script>

</body>
</html>
